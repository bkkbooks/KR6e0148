body:
  text: 菩薩戒弟子彭際清述念佛法門諸經廣讚約其總貫略有二涂一普念一專念如觀佛相海經佛不思議境界經等但明普念藥師琉璃光如來經阿閦佛經無量壽經等特明專念今此華嚴一多相入主伴交融即自即他亦專亦普略標五義以貫全經一念佛法身直指衆生自性門二念佛功德出生諸佛報化門三念佛名字成就最勝方便門四念毗盧遮那佛頓入華嚴法界門五念極樂世界阿彌陀佛圓滿普賢大願門別申問答豁破羣癡普與見聞同歸一乘云爾一念佛法身直指衆生自性者吾人固有之性湛寂光明遍周塵剎諸佛別無所證全證衆生自性耳如來出現品云菩薩摩訶薩應知自心念念常有佛成正覺何以故諸佛如來不離此心成正覺故如自心一切衆生心亦如是悉有如來成等正覺廣大周遍無處不有不離不斷無有休息又云無一衆生而不具有如來智慧但以妄想顛倒執著不能證得若離妄想一切智自然智無礙智則得現前文竟云何離于妄想須知一切衆生顛倒執著全是諸佛法身何以故顛倒執著常自寂滅故于此信入諸佛法身無處不現清淨圓滿中不容他念念不迷心心無所從此起行具足大悲究竟大慈于身無所取于修無所著于法無所住歷十住十行十回向十地十一地不離當念因果圓成故曰才發菩提即成正覺如賢首品初發心功德品廣明斯事如是念佛能于一切處見如來身又如光明覺品世尊放百億光明從此三千大千世界遍照十方乃至盡法界虗空界而文殊說頌教人離于有無一異生滅去來種種諸見遍一切處觀于如來是為入佛正信出現品亦云諸菩薩摩訶薩不應于一法一事一身一國土一衆生見于如來應遍一切處見于如來譬如虗空遍至一切色非色處非至非不至何以故虗空無身故如來身亦復如是遍一切處遍一切衆生遍一切法遍一切國土非至非不至何以故如來身無身故為衆生故示現其身又云菩薩摩訶薩以無障無礙智慧知一切世間境界是如來境界知一切三世境界一切剎境界一切法境界一切衆生境界真如無差別境界法界無障礙境界實際無邊際境界虗空無分量境界無境界境界是如來境界佛子如一切世間境界無量如來境界亦無量如一切三世境界無量如來境界亦無量乃至如無境界境界無量如來境界亦無量如無境界境界一切處無有如來境界亦如是一切處無有文竟何以故以自心智慧本無障礙故無障礙智慧即如來境界故此名念自性佛亦名自性念佛自性念佛者無佛外之念能念于佛念自性佛者無念外之佛為自所念不入此門所念之佛終非究竟以不識法身自性故將謂別有故入此門時一念功德過于虗空無有限量二念佛功德出生諸佛報化者一切如來稱法界量現種種身示無盡莊嚴作無邊佛事一以普光明智而為其體如世主妙嚴品云智入三世悉皆平等其身充滿一切世間其音普順十方國土譬如虗空具含衆像于諸境界無所分別文竟以此智不思議故無分劑故為能具足如斯力用在凡夫地聞法入理得根本智苟不能依智起行圓修圓證墮于二乘聲聞境界諸佛大用不得現前是故此經初會六品全顯如來果德二會至八會三十二品明進修階次直至菩提總之不出六位因果為令行者昭廓智境窮諸行門不取偏空而嚴佛土而初會中普賢三昧一品正顯佛華嚴全體經明普賢菩薩入一切諸佛毗盧遮那藏身三昧此三昧者依于法界稱性遍周一切剎塵普身示現教諸衆生不舍塵勞繁興大用隨說世界成就品說華藏世界品以示淨穢諸剎一切唯心唯能深入普賢願海者一切處無非佛土一切時無非佛事此三昧品貫徹全經尋文自見至善財童子遍參知識而德雲比丘解脫長者瑟胝羅居士俱以念佛一門而得解脫如德雲言我得自在決定解力信眼清淨智光照耀普觀境界離一切障善巧觀察普眼明徹具清淨行往詣十方一切國土恭敬供養一切諸佛常念一切諸佛如來總持一切諸佛正法常見一切十方諸佛文竟我得自在決定解力以下即念法身佛也往詣十方以下即念報化佛也隨順法身起于報化法身無量所感報化亦復無量故下文云見于東方一佛二佛十佛百佛千佛百千佛乃至不可說不可說佛剎微塵數佛如東方南西北方四維上下亦復如是文竟是名憶念一切諸佛境界智慧光明普見法門諸佛別無境界唯以智慧光明隨順衆生而作佛事此念佛人亦復如是由信解具足故能入佛智慧由觀行具足故能見佛光明智慧光明不從人得唯藉緣因得顯發故下文又開諸大菩薩三七念佛門盡于十方三世及一一毛端量處念念佛出世念念佛說法念念佛滅度一以自心無邊智行而為其體本具三身一念相應名為念佛三昧入此三昧門即能遍攝一切諸三昧門又如解脫長者言我入出如來無礙莊嚴解脫門見十方各十佛剎微塵數如來彼諸如來不來至此我不往彼我若欲見安樂世界阿彌陀如來隨意即見我若欲見栴檀世界金剛光明如來妙香世界寶光明如來蓮華世界寶蓮華光明如來妙金世界寂靜光如來妙喜世界不動如來善住世界師子如來鏡光明世界月覺如來寶師子莊嚴世界毗盧遮那如來如是一切悉皆即見知一切佛及以我心悉皆如夢知一切佛猶如影像自心如水知一切佛所有色相及以自心悉皆如幻知一切佛及以己心悉皆如響我如是知如是憶念所見諸佛皆由自心文竟所謂無礙莊嚴解脫者離一切相成一切相雖然如夢如幻而亦不壞夢幻諸境若不入此夢幻法門者便如舍利弗大目犍連等在逝多林不見如來神力境界以善根不同故又如瑟胝羅言我開栴檀座如來塔門時得三昧名佛種無盡我入此三昧隨其次第見此世界一切諸佛所謂迦葉佛拘那含牟尼佛拘留孫佛尸棄佛毗婆尸佛提舍佛弗沙佛無上勝佛無上蓮華佛如是等而為上首于一念頃得見百佛千佛百千佛乃至不可說不可說世界微塵數佛文竟此佛種無盡皆由普賢願行所生蓋普賢願行俱以四無盡句而得成就所謂虗空界盡衆生界盡衆生業盡衆生煩惱盡我願乃盡而虗空界乃至煩惱無有盡故是則佛種無盡故曰我知十方一切如來畢竟無有般涅槃者是知諸佛報化該一切數如阿僧祇品說窮一切時如如來壽量品說遍一切處如菩薩住處品說如是念佛二際平等生滅一如盡未來劫無有間斷三念佛名字成就最勝方便者夫法身無朕假于名而法身顯矣報化無邊緣于名而報化該矣須彌偈讚品云寧受地獄苦得聞諸佛名不受無量樂而不聞佛名所以于往昔無數劫受苦流轉生死中不聞佛名故但聞佛名已植勝因何況數數繼念如文殊般若經云欲入一行三昧應處空閒舍諸亂意不取相貌繫心一佛專稱名字隨佛方所端身正向能于一佛念念相續即是念中能見過去未來現在諸佛何以故念一佛功德無量無邊亦與無量諸佛功德無二文竟阿彌陀經亦以執持名號為往生正因故知名字功德不可思議又如兜率偈讚品云以佛為境界專念而不息此人得見佛其數與心等賢首品云若常念佛心不動則常覩見無量佛若常覩見無量佛則見如來體常住前偈論持名故言數後兼報化以徹法身故言無量雖然人知有量之數而莫知離量之數知即數之名而不知離數之名知離數之名故終日念而未嘗念也知離量之數故念一佛而即遍攝一切佛也如隨好光明品云如我說我而不著我不著我所一切諸佛亦復如是自說是佛不著于我及以我所文竟然初入此門必依乎數日須尅定課程自一而萬自萬而億念不離佛佛不異心如月在水月非水內如春在枝春非枝外如是念佛名字即法身名字性不可得故法身即名字法身遍一切故乃至報化不異名字名字不異報化亦復如是故如來名號品謂一如來名號與法界虗空界等隨衆生心各別知見則知世間凡所有名即是佛名隨舉一名諸世間名無不攝矣又如毗盧遮那品稱引古先諸佛各各不同而一以毗盧概之以一切諸佛皆有毗盧藏身故古今不異故如是念佛持一佛名全收法界全法界名全法界收非過去非現在非未來亦非南西北方四維上下十方三世當念無餘不歷剎那成佛已竟四念毗盧遮那佛頓入華嚴法界者如世主妙嚴品十方諸大菩薩及天龍神鬼所說諸頌各出自證法門以如來果地發人信解令入念佛三昧自是說如來現相品以及十信十住十行十回向各有十方諸大菩薩及諸世主說偈讚佛而十地品每歷一地必曰不離念佛念法念僧是知諸位階次雖殊莫不以念佛為其本行佛佛道同舉一毗盧攝無不盡故普賢十願常隨佛學一門云如此娑婆世界毗盧遮那如來從初發心精進不退以不可說不可說身命而為布施乃至成大菩提入于涅槃如是一切我皆隨學文竟由我本師因地修行廣大無邊不可思議故所感報化亦廣大無邊不可思議行者誠能決定信解知一切佛不離自性起勇猛心起儋何心便與本師初發心時等無有異又如寂靜音海夜神言我得念念出生廣大喜莊嚴解脫已能入十不可說不可說佛剎微塵數法界安立海見彼一切法界安立海一切佛剎所有微塵一一塵中有十不可說不可說佛剎微塵數佛國土一一佛土皆有毗盧遮那坐于道場于念念中成等正覺現諸神變所現神變一一皆遍一切法界海而開敷樹華夜神入出生廣大喜光明解脫門憶念毗盧遮那往昔所修行海悉皆明見妙德圓滿神得自在受生解脫門入毗盧遮那無量受生海亦見如來于一切世界一一塵中無量佛剎示現受生常無間斷文竟如是念于毗盧遮那即念是佛即佛是念盡十方虗空乃至針鋒芥子許無一不是毗盧法界是名念法界佛亦名遍念一切佛所以善財童子初參德雲即聞念佛法門最後普賢菩薩為說稱讚如來勝功德偈教人信解依舊不離念佛法門法界始終更無二諦偈曰或見此界妙無比佛無量劫所嚴淨毗盧遮那最勝尊于中覺悟成菩提或有見佛無量壽觀自在等所圍繞悉已住于灌頂地充滿十方諸世界又云或見釋迦成佛道已經不可思議劫或見今始為菩薩十方利益諸衆生或見如來無量壽與諸菩薩授尊記而成無上大導師次補住于安樂剎文竟是知諸佛法界遍攝遍融彌陀全體遮那極樂不離華藏隨衆生心見各不同而佛本來常不動故故末卷即以回向極樂終之具如後文所說五念極樂世界阿彌陀佛圓滿普賢大願者普賢行願品云欲成就如來功德門當修十種廣大行願一者禮敬諸佛二者稱讚如來三者廣修供養四者懺悔業障五者隨喜功德六者請轉法輪七者請佛住世八者常隨佛學九者恆順衆生十者普皆回向于此願王受持讀誦臨命終時即得往生極樂世界文竟是經專顯毗盧境界云何必以極樂為歸蓋阿彌陀一名無量光而毗盧遮那此翻光明遍照同一體故非去來故于一體中要亦不礙去來故如大乘起信論云衆生初學是法欲求正信其心怯弱以住此娑婆世界不能常值諸佛親承供養意欲退者當知如來有勝方便攝護信心謂專念西方極樂世界阿彌陀佛所修善根回向願求生彼世界即得往生常見佛故終無有退文竟蓋毗盧報土與二乘凡夫無接引之分而極樂則九品分張萬流齊赴一得往生橫截生死視此娑婆迥分勝劣諸經廣明今不具録然他經所指或言十念或言一日乃至七日或觀丈六乃至六十萬億那由他恆河沙由旬要之不出數量未若此經一念普觀豎窮三世橫亘十虗初發心時即超數量所有淨因最為殊勝由阿彌陀佛以四十八願遍攝衆生與此願王體合虗空絲毫不隔是故不移時不易處任運往生還同本得下文云到已即見阿彌陀佛文殊師利菩薩普賢菩薩觀自在菩薩彌勒菩薩等所共圍繞文竟文殊普賢不離此處而現彼方隨衆生心念念出現故知阿彌陀佛在極樂國中常轉此經熾然無間又此法門非妙智觀察無以明我心本具之淨因故首文殊非大願莊嚴無以圓我心本具之淨果故次普賢而觀音彌勒一則次補彌陀一則次補釋迦二聖同會以證樂華藏通一無二而彌勒以諦觀十方唯識識心圓明入圓成實此淨土之正因也觀音以如幻聞熏無作妙力遍入國土成就菩提此淨土之極果也下文云其人自見生蓮華中蒙佛授記得授記已經于無數百千萬億那由他劫以智慧力隨衆生心而為利益不久當坐菩提道場降伏魔軍成等正覺轉妙法輪能令佛剎極微塵數衆生發菩提心隨其根性教化成熟乃至盡于未來劫海廣能利益一切衆生文竟全部華嚴于此結果諸有智人決宜信入一念因循輪回無盡嗚呼苦哉或問如上五門為當從一門入為是五門並入答上根利智了得自性彌陀全顯唯心淨土舉一法身攝無不盡然理則頓悟事須漸除故華嚴教指十住初心即同諸佛然五位進修不無趣向未臻妙覺階次宛然至十地始終以大願力于一念頃見多百佛多千佛乃至百千億那由他佛所居之地悉隨所見之佛而為差等此土行人縱能伏惑發悟而未證無生寧逃後有不依佛力功行難圓必待回向樂親承授記淨諸餘習成滿願王斯為一門超出妙莊嚴路其或粗窺向上未盡疑情尤須專一持名翹勤發願如子憶母畢命為期加以教觀熏修助發勝智感應道交功無虗棄斯則全憑一念便攝諸門所貴絶利一原切忌回頭轉腦又問子欲闡念佛法門何不以淨土諸經為導而力主華嚴據果論因恐難合轍答子不讀無量壽經乎經中敘分首述普賢行願勸進行人三輩往生俱云發菩提心終之以不了佛智不思議智不可稱智無等無倫最上勝智縱修功德還墮胎生然則誠欲坐寶蓮華登不退地必也依文殊智建普賢願回向往生今此華嚴正當其教至觀經上品上生者必誦讀大乘方等經典言大乘方等則又莫若華嚴最尊第一因果無差有何紆曲又問華嚴法界密義重重以無量修多羅而為眷屬云何唯一念佛門而能普攝答誠如所說教指宏深但入道初心自有方便入此一門乃能遍徹無邊法界是故善財童子于普賢一毛孔中過不可說不可說佛剎微塵數世界盡未來劫念念周遍無邊剎海此念佛人亦復如是以一念本無量故且杜順法界觀特設三門一真空門簡妄情以顯理即前念佛法身是二理事無礙門融理事以顯用即前念佛功德是三周遍含容門攝事事以顯元即前念佛名字是又清涼疏分四法界一心念佛不雜餘業即入事法界心佛雙泯一真獨脫即入理法界即心即佛大用齊彰即入理事無礙法界非佛非心神妙不測即入事事無礙法界是知一念佛門無法不攝故此經以毗盧為導以極樂為歸既覲彌陀不離華藏家珍具足力用無邊不入此門終非究竟又問方山論謂他方淨土是權非實準今所論如何會通答教分四土一常寂光土果佛所居二實報土法身大士所居三有餘土二乘所居四同居土凡聖交參或穢或淨此土行人以專念力修諸功德回向西方惑業未斷生同居土欣厭既切粗漏漸除聞法增進生有餘土若修圓教為因深達實相以普賢行願回向往生便感得實報土親承佛記分證寂光是故住權乘者一切皆權如法華化城不外自心故明實相者一切皆實如此經極樂全具華藏故方山著論時行願末卷未至此方故于淨土一門輒生分別却與經文互相乖剌須知從真起幻即幻全真生滅俱離自他不二一念圓融普周法界方為一乘中道了義且方山喫緊提唱唯在十住初心即成正覺然依教詮判正大不易何則圓信位中見思惑盡并斷塵沙進入圓住豁破無明證無生忍位齊別教初地若依自力譬彼羣氓驟希寶位即謂本來是佛不落階梯亦賴善巧方便始能尅證何如行願末卷中說以深信心持誦十大願王一剎那中往生極樂住不退轉從凡夫地創發信心橫超直入至圓至頓無比無倫幸遇完經因緣非淺衣珠故在客作徒勞奉勸高流同心信受又問隋僧靈幹作華藏觀臨終見大水彌滿華如車輪而坐其上但得直趣華藏何須更覲彌陀答華藏世界有十不可說佛剎微塵數香水海有十不可說微塵數世界種安住一一世界種復有不可說佛剎微塵數世界西方極樂亦在其中首楞嚴云若飛心中兼福兼慧及與淨願自然心開見十方佛一切淨土隨願往生今靈幹所生其為極樂淨土邪其為餘方淨土邪俱未可知然則但覲彌陀即是直趣華藏前有善財後有龍樹如斯軌轍千聖同行不遵佛敕自困多岐是則名為可憐憫者更以近事徵之宋明州草庵道因修圓頓教觀晚主延慶乾道三年四月十七日別徒衆曰華嚴世界洞徹湛明甚適我懷今將行矣乃令舉所述彌陀讚曰無邊剎海海涵空海空全是蓮華宮蓮宮周遍遍空海空海獨露彌陀容阿彌陀佛不生滅難覓難拈水中月絶非離句如是身如是感通如是說我與彌陀本不二妄覺潛生忽成異從今掃盡空有塵父子天然兩相值誓修三福勤六念身口意業無瑕玷我今以此念彌陀不見彌陀終不猒讚畢隨衆唱佛數百諷觀經至上品上生即斂念坐脫極樂華嚴是同是別諸有智人急須著眼是論作于乾隆四十八年冬十二月既成汪子大紳評之曰此淨土正因華嚴正信也又曰五念一念一念無念其明年春過丹徒王子禹卿見而賞之為之敘大紳頗歎為奇特尋奉先尚書公諱既葬屏居僧舍展讀大經與方外友性宗唯然相質證輒于此論時有損益其後數年自錢塘歸重閉關文星閣中修念佛三昧長夏寥寂復出前稿點勘再周録成此本于賢首方山外不妨別出手眼設遇雲栖老人定當相視而笑也時乾隆五十六年六月晦際清記
