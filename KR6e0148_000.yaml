front:
  text: 華嚴念佛三昧論敘大乘起信論云一切衆生不名為覺以從本來念念相續未曾離念念者不覺也佛者覺也念佛者以覺攝不覺也念佛三昧者以覺攝不覺入于正覺海也華嚴具諸佛一切三昧而其間念佛三昧為一切三昧中王大莫過于是方莫過于是廣莫過于是矣知歸居士修念佛三昧者十數年而又于華嚴義海一門深入頃過鎮江出所著華嚴念佛三昧論見示舉清涼棗柏恆河沙字數而包舉以五六千言覺疏鈔合論非多此論非少且當棗柏著論時行願全品未至此方故于他方淨土輒生別異此品全出必待此論而義始完其殆阿彌陀佛神力加被俾居士隨宜説法廣導羣品者乎竊謂念佛修淨土者轉煩惱惡血為清淨法乳也由念佛而獲三昧所謂念歸無念轉生乳為熟酪也于三昧中精進念佛所謂無念而念變熟酪為生酥也由念佛三昧遍歷一切三昧夫然後具足念佛三昧變生酥為熟酥也以念佛三昧統攝無量無邊不可説三昧以無量無邊不可説三昧攝入念佛三昧即念即佛非念非佛微妙神通不可思議轉熟酥為醍醐也不能轉乳為酪雖念佛而不能得三昧門不能變酪為酥不能以念佛三昧攝一切不可説三昧門不能轉酥酪為醍醐不能以念佛一門直超十地等覺獲大圓鏡智坐證無上菩提夫念佛無差別而三昧有淺深三昧之淺深念佛之差別也文治自弱冠即喜修禪四十以後始兼修念佛比年來以念佛為禪復以禪念佛禪淨並運將終老焉敢以所見質之居士幸有以教我歲次甲辰春三月無餘學人王文治撰
